<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umar &amp; Aiesha • Wedding Invitation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Great+Vibes&amp;display=swap');

    :root {
      --gold: #C5A46E;
      --gold-foiling: #D4AF37;
      --text: #2C2522;
    }

    body {
      margin: 0;
      font-family: 'Playfair Display', Georgia, serif;
      background: url('bg.jpg') center/cover no-repeat fixed;
      color: var(--text);
      line-height: 1.7;
    }

    .name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.8rem, 8vw, 4.8rem);
    }

    .ampersand {
      font-family: 'Great Vibes', cursive;
      font-size: 3.2rem;
      color: var(--gold);
      margin: 0 0.5rem;
    }

    .section-title {
      font-size: 1.7rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .gold-divider {
      text-align: center;
      margin: 2.5rem 0;
    }

    .gold-divider img {
      max-width: 320px;
      width: 100%;
    }

    .event-name-card {
      background: white;
      border: 1px solid #D4C3A3;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .event-name-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
    }

    .event-name-card h3 {
      font-size: 1.9rem;
      margin: 1rem 0 0.5rem;
    }

    .event-name-hint {
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .btn {
      padding: 0.9rem 2rem;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
      letter-spacing: 1px;
      cursor: pointer;
      margin: 0 8px;
    }

    .btn:hover {
      background: var(--gold);
      color: white;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      border-radius: 14px;
      max-width: 440px;
      width: 95%;
      padding: 2.5rem 2rem;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.3rem;
      font-size: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ENVELOPE -->
  <div id="envelope-screen" style="position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6);">
    <div id="envelope" style="position:relative; width:min(420px,92vw); height:min(310px,68vh); cursor:pointer;">
      <div style="position:absolute; inset:0; background:white; border:14px solid var(--gold); box-shadow:0 30px 80px rgba(0,0,0,0.3);">
        <!-- Monogram Image -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:110px; height:110px;">
          <img src="monogram.png" alt="U & A Monogram" style="width:100%; height:100%; object-fit:contain;">
        </div>
        <div style="position:absolute; bottom:42px; left:0; right:0; text-align:center; font-size:1.05rem; letter-spacing:3.5px; font-weight:600;">
          UMAR RASHEED &amp; AIESHA BASHIR
        </div>
        <div style="position:absolute; bottom:20px; left:0; right:0; text-align:center; font-size:0.8rem; letter-spacing:3px; color:#A67C52;">
          TAP TO OPEN
        </div>
      </div>

      <!-- Flap -->
      <div id="flap" style="position:absolute; top:-2px; left:-2px; width:calc(100% + 4px); height:52%; background:linear-gradient(#F9F4EB, #F3EDE3); border:14px solid var(--gold); border-bottom:none; transform-origin:top center; transition:transform 1.4s cubic-bezier(0.23,1,0.32,1); z-index:4;"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-invitation" style="max-width:1100px; margin:0 auto; padding:2rem 1rem; opacity:0; visibility:hidden; transition:all 1.2s ease;">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:1rem; border-bottom:1px solid #D4C3A3; margin-bottom:1.5rem;">
      <div style="font-family:'Great Vibes', cursive; font-size:1.6rem; color:var(--gold);">Umar &amp; Aiesha</div>
      <div>
        <button id="music-btn" class="btn" style="padding:0.5rem 1.2rem; border-radius:50px;">♫ Music</button>
        <button id="theme-btn" class="btn" style="padding:0.5rem 1.2rem; border-radius:50px;">Dark</button>
      </div>
    </div>

    <!-- Bismillah -->
    <div style="text-align:center; padding:2rem 0;">
      <div style="font-size:2.3rem; color:var(--gold-foiling); margin-bottom:0.5rem;">بِسْمِ ٱللَّٰهِ ٱلرَّحْم
