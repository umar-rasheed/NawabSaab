<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umar Rasheed & Aiesha Bashir</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Envelope -->
    <div id="envelope" class="envelope">
        <div class="flap"></div>
        <div class="invite-text">Tap to Open</div>
    </div>

    <!-- Main Invitation -->
    <div id="main-invitation" class="main-invitation hidden">
        <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
        <h1 class="couple">Umar Rasheed & Aiesha Bashir</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="mehndi">Mehndi</button>
            <button class="tab-btn" data-tab="barat">Barat</button>
            <button class="tab-btn" data-tab="walima">Walima</button>
        </div>

        <div id="mehndi" class="tab-content">
            <h2>Mehndi Ceremony</h2>
            <p>28 July 2026</p>
        </div>
        <div id="barat" class="tab-content hidden">
            <h2>Barat</h2>
            <p>30 July 2026 • 3:00 PM</p>
            <p>Sialkot Grand Event Marquee</p>
        </div>
        <div id="walima" class="tab-content hidden">
            <h2>Walima</h2>
            <p>2 August 2026 • 2:00 PM</p>
            <p>Bradan Marquee</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
