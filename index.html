<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Luxury Islamic Wedding Invitation">
    <title>NawabSaab Wedding</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Opening Screen -->
    <div id="opening-screen" class="opening-screen">
        <div class="content">
            <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم</div>
            <h1 class="couple-names">NawabSaab</h1>
            <p class="invitation-text">You are cordially invited</p>
            <button id="open-invitation" class="open-btn">Open Invitation <i class="fas fa-arrow-down"></i></button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="main-content hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">Wedding</div>
                <button id="music-toggle" class="music-btn"><i class="fas fa-music"></i></button>
            </div>
        </nav>

        <section id="hero" class="hero">
            <div class="hero-content">
                <h1>In the Name of Allah</h1>
                <div class="couple-hero">
                    <span class="groom">Groom Name</span> &amp; <span class="bride">Bride Name</span>
                </div>
                <p class="date">Date: [Put your date here]</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
